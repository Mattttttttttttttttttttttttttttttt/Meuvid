<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meuvid — Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="topbar-container"></div>
  <div id="modal-container"></div>
  <div id="app"></div>

  <script src="data.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="dict.js"></script>
  <script>
    const page = createDictPage({
      hasPos: true,
      dataKey: 'mv_dict',
      defaultData: DEFAULT_DICT,
      kwTable: DICT_KEYWORDS,
      label: 'word',
      noun: 'words',
    });

    function render() {
      initNav(
        'dict',
        () => AUTH.showLoginModal(render),
        () => { AUTH.logout(); render(); }
      );
      page.render();
    }

    render();
  </script>
</body>

</html>
