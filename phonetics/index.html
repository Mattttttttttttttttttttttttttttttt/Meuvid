<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <div id="topbar-container"></div>
  <div id="modal-container"></div>
  <div id="app"></div>

  <script src="../data.js"></script>
  <script src="../lang-data.js"></script>
  <script src="../utils.js"></script>
  <script src="../auth.js"></script>
  <script src="../nav.js"></script>
  <script src="../textpage.js"></script>

    const page = createTextPage({
      dataKey: 'mv_phonetics',
      dataRaw: PHONETICS,
    });

    function render() {
      initNav(
        'phonetics',
        () => AUTH.showLoginModal(render),
        () => { AUTH.logout(); render(); }
      );
      page.render();
    }

    render();
  </script>
