<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meuvid — Roots</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar-container"></div>
  <div id="modal-container"></div>
  <div id="app"></div>

  <script src="data.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="dict.js"></script>
  <script>
    AUTH.init();

    const page = createDictPage({
      hasPos:      false,
      dataKey:     'mv_roots',
      defaultData: DEFAULT_ROOTS,
      kwTable:     ROOTS_KEYWORDS,
      label:       'root',
      noun:        'roots',
    });

    function render() {
      initNav(
        'roots',
        () => AUTH.showLoginModal(render),
        () => { AUTH.logout(); render(); }
      );
      page.render();
    }

    render();
  </script>
</body>
</html>
